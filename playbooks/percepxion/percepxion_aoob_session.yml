---
# percepxion_aoob_session, Initiate or terminate OOB terminal sessions via Percepxion
#
# What this does:
#   state=present  Opens an OOB terminal session to a device and returns a
#                  session_id. Always changed=true. Each call opens a new
#                  connection (non-idempotent).
#   state=absent   Terminates an active session by session_id. Always changed=true.
#
# NOTE: The session endpoint paths are not confirmed in the Percepxion 6.12 API
#   spec. Verify with your Percepxion administrator before using in production.
#   See the module notes for details.
#
# Typical workflow:
#   1. Run with action=open to get a session_id.
#   2. Use the session_id to interact with the device (via the Percepxion UI
#      or a separate automation step that handles the terminal stream).
#   3. Run with action=close and the session_id to clean up.
#
# Run (open a session):
#   ansible-playbook -i inventory.yml playbooks/percepxion/percepxion_aoob_session.yml \
#     -e "operation=open device_id=abc-123-device-uuid"
#
# Run (close a session):
#   ansible-playbook -i inventory.yml playbooks/percepxion/percepxion_aoob_session.yml \
#     -e "operation=close session_id=sess-xyz-456"

- name: Manage Percepxion OOB terminal sessions
  hosts: percepxion_platform
  gather_facts: false

  vars:
    # "open" (state=present) or "close" (state=absent)
    operation: "open"

    # Device ID to connect to. Required when action=open.
    # Get from percepxion_devices.yml output (id field).
    device_id: ""

    # Session ID to terminate. Required when action=close.
    # Captured from the output of a previous action=open run.
    session_id: ""

    # Project scope.
    project_tag: ""
    tenant_id: ""

  tasks:

    - name: Validate parameters
      ansible.builtin.assert:
        that:
          - (operation == 'open' and device_id | length > 0) or
            (operation == 'close' and session_id | length > 0)
        fail_msg: >-
          operation=open requires device_id.
          operation=close requires session_id.

    - name: Open OOB session to device {{ device_id }}
      lantronix.oob.percepxion_aoob_session:
        device_id: "{{ device_id }}"
        state: present
        project_tag: "{{ project_tag | default(omit) }}"
        tenant_id: "{{ tenant_id | default(omit) }}"
      register: open_result
      when: operation == "open"

    - name: Display session details
      ansible.builtin.debug:
        var: open_result
      when: operation == "open"

    - name: Show session ID for reference
      ansible.builtin.debug:
        msg: >-
          OOB session opened. session_id={{ open_result.session_id | default('see full output') }}.
          Save this ID to close the session when done.
      when: operation == "open" and open_result is defined

    - name: Close OOB session {{ session_id }}
      lantronix.oob.percepxion_aoob_session:
        session_id: "{{ session_id }}"
        state: absent
        project_tag: "{{ project_tag | default(omit) }}"
        tenant_id: "{{ tenant_id | default(omit) }}"
      register: close_result
      when: operation == "close"

    - name: Confirm session closed
      ansible.builtin.debug:
        msg: "Session {{ session_id }} terminated (changed={{ close_result.changed }})"
      when: operation == "close" and close_result is defined
