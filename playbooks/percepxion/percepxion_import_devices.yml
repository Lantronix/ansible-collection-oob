---
# percepxion_import_devices, Register and assign devices to Percepxion
#
# What this does:
#   Registers one or more devices in Percepxion using POST /v1/device/register,
#   then assigns them to a project. Checks whether each device is already
#   registered (by device_id / serial number) before calling register, skips
#   already-registered devices (idempotent).
#
# Required per device (matches the "Import Lantronix Device" screen in Percepxion):
#   device_id    The serial number printed on the device label. This is what
#                Percepxion calls the Serial Number in the UI.
#   device_key   The unique 32-character Device ID. This is what Percepxion
#                calls the Device ID in the UI. Older SLC devices without a
#                Device ID must be provisioned with LPM before import.
#   device_name  A user-defined name for the device (e.g. "slc-dc1-rack3").
#
# Optional per device:
#   device_description  Free-text description (e.g. location, purpose).
#
# Where to find device_id and device_key:
#   - Physical label on the SLC chassis
#   - Lantronix Provisioning Manager (LPM) utility
#   - SLC web manager or CLI (show system identity)
#
# Run:
#   ansible-playbook -i inventory.yml playbooks/percepxion/percepxion_import_devices.yml
#
# Override project at runtime:
#   ansible-playbook -i inventory.yml playbooks/percepxion/percepxion_import_devices.yml \
#     -e "target_project=datacenter-east"

- name: Register and assign devices to Percepxion
  hosts: percepxion_platform
  gather_facts: false

  vars:
    # Project to assign newly registered devices to.
    # Leave empty to register without project assignment.
    target_project: "my-project"

    # Tenant ID for Project Admin operations.
    tenant_id: ""

    # List of devices to register.
    # Each entry requires device_id (serial number), device_key (32-char Device ID),
    # and device_name. device_description is optional.
    devices:
      - device_id: "SN123456"
        device_key: "a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4"
        device_name: "slc-datacenter-01"
        device_description: "SLC9016, DC East, rack 3"
      - device_id: "SN789012"
        device_key: "b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5"
        device_name: "slc-datacenter-02"
      # Add additional devices here:
      # - device_id: "SN000099"
      #   device_key: "c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6"
      #   device_name: "slc-branch-office-01"
      #   device_description: "SLC9032, branch office Seattle"

  tasks:

    - name: Validate device list is not empty
      ansible.builtin.assert:
        that:
          - devices | length > 0
        fail_msg: "At least one device entry is required in the devices list."

    - name: Register and assign {{ devices | length }} device(s) to Percepxion
      lantronix.oob.percepxion_import_devices:
        devices: "{{ devices }}"
        project_tag: "{{ target_project | default(omit) }}"
        state: present
        tenant_id: "{{ tenant_id | default(omit) }}"
      register: import_result

    - name: Display import result
      ansible.builtin.debug:
        var: import_result

    - name: Show registration summary
      ansible.builtin.debug:
        msg: >-
          Import complete:
          {{ import_result.registered | default([]) | length }} registered,
          {{ import_result.skipped | default([]) | length }} already existed (skipped).
          {{ ('Assigned to project: ' + target_project) if target_project | length > 0 else 'No project assignment.' }}
