---
# COMBO: Incident Response, Verify OOB Path to an Affected Device
# Persona: NOC Engineer responding to a network outage
#
# What this does (in order):
#   1. Confirm the SLC9000 is reachable and collect current facts
#   2. Check what devices are visible on serial ports (including unmanaged/offline)
#
# Why this combo?
#   During an outage the production network path to the target device is down.
#   This playbook confirms the OOB path is intact and identifies the device on the
#   serial port. No single module covers this end-to-end workflow.
#
# After confirming the OOB path:
#   - Open an AOOB terminal session via the Percepxion web UI at gopercepxion.ai
#   - Use the device name/serial from the serial_devices output to locate the device
#
# Run:
#   ansible-playbook -i inventory.yml playbooks/combo/incident_response_oob.yml
#
# Filter to show only unmanaged/offline devices:
#   ansible-playbook -i inventory.yml playbooks/combo/incident_response_oob.yml \
#     -e "port_status_filter=unmanaged"

- name: Incident response, confirm OOB path
  hosts: slc_devices
  gather_facts: false

  vars:
    # ---- Filter for managed device check ----
    # "unmanaged" surfaces devices that lost their management connection.
    # Use "" (empty) to see all devices.
    port_status_filter: ""

  tasks:

    - name: "OOB Check | Gather SLC9000 facts"
      lantronix.oob.slc_facts:
      register: slc_facts

    - name: "OOB Check | Confirm SLC is online"
      ansible.builtin.debug:
        msg: >-
          SLC ONLINE: {{ inventory_hostname }}
          firmware={{ slc_facts.slc_facts.current_firmware_version | default('unknown') }},
          uptime={{ slc_facts.slc_facts.uptime | default('unknown') }}

    - name: "OOB Check | Query serial port device status"
      lantronix.oob.slc_managed_devices:
        filter_status: "{{ port_status_filter | default(omit) }}"
      register: serial_devices

    - name: "OOB Check | Show devices visible on serial ports"
      ansible.builtin.debug:
        msg: >-
          {{ (serial_devices.managed_devices | default([])) | length }} device(s) on serial ports.
          OOB path confirmed. Open an AOOB session via the Percepxion web UI at gopercepxion.ai.
