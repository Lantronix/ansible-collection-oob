[defaults]
# Use the development checkout. Requires the repo checked out at:
#   ansible_collections/lantronix/oob/
# Run ansible-test and playbooks from that directory.
collections_path = ../../..

[persistent_connection]
# Short timeout so ansible-connection daemons shut down promptly after each
# playbook run, triggering logout() and releasing the SLC REST API session.
# SLC9000 allows a maximum of 20 concurrent REST sessions.
connect_timeout = 5
