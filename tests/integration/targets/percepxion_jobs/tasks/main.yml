---
# Read-only smoke test for percepxion_jobs.
#
# KNOWN LIMITATION: /v1/job/jobgroup/create requires a full operation payload
# (type, subtype, op_code, operation, device_id) specific to the job action.
# The module's create/delete interface doesn't match the API's required payload
# structure. CRUD coverage lives in unit tests.
# This test validates the search (query) path runs without error.
# tenant_id must be passed explicitly -- connection.get_tenant_id() returns None.

- name: Search for existing job groups (state=query with no match expected)
  lantronix.oob.percepxion_jobs:
    name: "ansible-smoke-nonexistent"
    tenant_id: "{{ percepxion_tenant_id }}"
    state: query
  register: query_result

- name: Verify query returns job_logs key (may be empty)
  ansible.builtin.assert:
    that:
      - query_result.job_logs is defined
      - query_result.job_logs is iterable
      - query_result.changed is false
    success_msg: "percepxion_jobs query smoke test passed: {{ query_result.job_logs | length }} log entries returned"
    fail_msg: "percepxion_jobs query did not return expected keys: {{ query_result }}"
