---
# percepxion_aoob_session: establishes CLI console sessions via Percepxion.
# Uses device_id (UUID), not hostname. device_id looked up from percepxion_devices.
# session_id returned on open, required for close.

- name: percepxion_aoob_session | tier4-gate | check managed device reachability
  ansible.builtin.command:
    cmd: "{{ managed_device_console_command }}"
    stdin: "show version\nexit\n"
  register: tier4_gate
  ignore_errors: true
  delegate_to: localhost
  vars:
    ansible_connection: local

- name: percepxion_aoob_session | tier4-gate | set fact
  ansible.builtin.set_fact:
    managed_device_available: "{{ tier4_gate.rc == 0 }}"

- name: percepxion_aoob_session | tier4-gate | skip notice
  ansible.builtin.debug:
    msg: "Managed device unreachable, AOOB session tests will be skipped"
  when: not managed_device_available

- name: percepxion_aoob_session | tier4 | look up write-lane device_id
  lantronix.oob.percepxion_devices:
    search_string: "{{ slc_write_hostname }}"
    project_tag: "{{ percepxion_write_project_tag | default(omit) }}"
    tenant_id: "{{ percepxion_write_tenant_id | default(omit) }}"
    limit: 1
  register: write_lane_device
  delegate_to: percepxion-write
  when: managed_device_available

- name: percepxion_aoob_session | tier4 | assert write-lane device visible in Percepxion project
  ansible.builtin.assert:
    that:
      - write_lane_device.devices | length == 1
    success_msg: "percepxion_aoob_session | tier4 | write-lane device visible in Percepxion"
    fail_msg: "percepxion_aoob_session | tier4 | FAIL: write-lane device not found in Percepxion project"
  when: managed_device_available

- name: percepxion_aoob_session | tier4 | set device_id and connectivity facts
  ansible.builtin.set_fact:
    write_device_id: "{{ write_lane_device.devices[0].device_id }}"
    aoob_session_available: "{{ write_lane_device.devices[0].comm_state | default('Down') == 'Up' }}"
  when: managed_device_available and write_lane_device.devices | length == 1

- name: percepxion_aoob_session | tier4 | skip notice if device not connected
  ansible.builtin.debug:
    msg: >-
      Device found in Percepxion but comm_state={{ write_lane_device.devices[0].comm_state | default('unknown') }}
      (device_state={{ write_lane_device.devices[0].attributes.device_state | default('unknown') }}).
      AOOB session tests will be skipped.
      To enable: ensure the write-lane SLC9000 Percepxion client is registered and comm_state is Up.
  when: managed_device_available and write_lane_device.devices | length == 1 and not aoob_session_available

- name: percepxion_aoob_session | tier4 | open AOOB session
  lantronix.oob.percepxion_aoob_session:
    device_id: "{{ write_device_id }}"
    state: present
  register: session_result
  delegate_to: percepxion-write
  when: managed_device_available and aoob_session_available | default(false)

- name: percepxion_aoob_session | tier4 | assert session opened
  ansible.builtin.assert:
    that:
      - session_result.changed == true
      - session_result.session_id is defined
      - session_result.session_id | length > 0
    success_msg: "percepxion_aoob_session | tier4 | AOOB session established, session_id={{ session_result.session_id }}"
    fail_msg: "percepxion_aoob_session | tier4 | FAIL: session did not return session_id"
  when: managed_device_available and aoob_session_available | default(false)

- name: percepxion_aoob_session | tier4 | close AOOB session
  lantronix.oob.percepxion_aoob_session:
    device_id: "{{ write_device_id }}"
    session_id: "{{ session_result.session_id }}"
    state: absent
  register: close_result
  delegate_to: percepxion-write
  when: managed_device_available and aoob_session_available | default(false) and session_result.session_id is defined

- name: percepxion_aoob_session | tier4 | assert session closed
  ansible.builtin.assert:
    that:
      - close_result.changed == true
    success_msg: "percepxion_aoob_session | tier4 | session closed cleanly"
    fail_msg: "percepxion_aoob_session | tier4 | FAIL: session close did not report changed"
  when: managed_device_available and aoob_session_available | default(false) and session_result.session_id is defined

# UNTESTED STATES:
# - AOOB session open/close: POST /v3/device/connect returns 401 "Invalid device token size"
#   as of 2026-05-25. After full de-registration and re-registration of the write-lane SLC9000 to the write-lane
#   Percepxion tenant, comm_state=Up and device_state=Connected, session tests now attempt to
#   run, but the 401 persists. The Percepxion API returns device_key="" for this device even
#   after re-registration, indicating the ZTC device key did not upload to Percepxion's DB.
#   Resolution requires either (a) clearing the device key server-side via the Percepxion backend
#   team to force a clean re-upload, or (b) confirming the correct /v3/device/connect payload
#   (endpoint is undocumented in the 6.12 API spec; paths marked TBD in percepxion_client.py).
# - session to offline device: Percepxion behavior when SLC9000 is unreachable during AOOB request.
# - session timeout mid-transfer: behavior when device closes session mid-command.
# - concurrent sessions: two simultaneous AOOB sessions to the same port.
# - session_id expiry: behavior when state=absent called with expired session_id.
