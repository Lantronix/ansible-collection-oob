---
# User management integration test.
# NOTE: Create/delete require tenant_admin role. The sandbox credential (your.username@example.com)
# is project_admin, so CRUD endpoints return 404. This test validates the idempotency
# read path only. CRUD is covered by unit tests.
# tenant_id must be passed explicitly -- connection.get_tenant_id() returns None in module context.
# NOTE: search_string on /v2/user/search filters on name/email, not username.
# The module now fetches all users and filters client-side for idempotency checks.

- name: Check existing user (ansible_test_user) with state=present -- expect changed=false
  lantronix.oob.percepxion_users:
    username: "ansible_test_user"
    tenant_id: "{{ percepxion_tenant_id }}"
    state: present
  register: existing_result

- name: Verify existing user reports changed=false
  ansible.builtin.assert:
    that:
      - existing_result.changed is false
      - existing_result.username == 'ansible_test_user'
    success_msg: "percepxion_users correctly reported changed=false for existing user"
    fail_msg: "Unexpected result for existing user: {{ existing_result }}"

- name: Check non-existent user with state=absent -- expect changed=false (already absent)
  lantronix.oob.percepxion_users:
    username: "ansible-test-nonexistent@ansible.local"
    tenant_id: "{{ percepxion_tenant_id }}"
    state: absent
  register: absent_result

- name: Verify absent user reports changed=false
  ansible.builtin.assert:
    that:
      - absent_result.changed is false
      - absent_result.username == 'ansible-test-nonexistent@ansible.local'
    success_msg: "percepxion_users correctly reported changed=false for absent user"
    fail_msg: "Unexpected result for absent user: {{ absent_result }}"
