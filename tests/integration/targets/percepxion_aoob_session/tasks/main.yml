---
# Smoke test for percepxion_aoob_session using check_mode (read-only).
#
# KNOWN LIMITATION: /v3/device/connect requires the physical device to have
# an active Percepxion device token (device-to-cloud registration). Lab devices
# (SLC9000_0ae0, SLC9000_0b28) are not actively registered, so live session
# tests return "Invalid device token size". Live CRUD coverage requires a
# properly registered device and lives in unit tests.
# This test verifies the module runs without crashing and reports would-change.
# tenant_id must be passed explicitly -- connection.get_tenant_id() returns None.

- name: Get device list to find an SLC9000 device ID
  lantronix.oob.percepxion_devices:
    search_string: "SLC9000"
    tenant_id: "{{ percepxion_tenant_id }}"
  register: devices_result
  delegate_to: percepxion-primary

- name: Fail early if no SLC9000 device found
  ansible.builtin.assert:
    that:
      - devices_result.devices | length > 0
    fail_msg: "No SLC9000 device found in sandbox, cannot run AOOB session smoke test"

- name: Set device_id fact
  ansible.builtin.set_fact:
    test_device_id: "{{ devices_result.devices[0].device_id }}"

- name: Check session initiation in check_mode (no actual connection)
  lantronix.oob.percepxion_aoob_session:
    device_id: "{{ test_device_id }}"
    tenant_id: "{{ percepxion_tenant_id }}"
    state: present
  check_mode: true
  register: session_result
  delegate_to: percepxion-primary

- name: Verify module reports would-change in check_mode
  ansible.builtin.assert:
    that:
      - session_result.changed is true
    success_msg: "percepxion_aoob_session smoke test passed: check_mode correctly reports changed=true"
    fail_msg: "Expected changed=true in check_mode, got: {{ session_result }}"

# UNTESTED STATES:
# - live session without managed device: DVT lane uses check_mode only due to invalid device token.
#   Live session tested in percepxion_aoob_session_dvt3 (Tier 4) against Cisco C3560G on port 1.
# - session timeout: behavior when session expires before state=absent call is undocumented.
# - concurrent sessions on same device: API behavior for multiple sessions is untested.
# - CLI command within session: send_direct_cli_command path not tested via this module.
