---
- name: Pull write-lane config snapshot
  lantronix.oob.slc_config:
    action: get
  register: dvt3_config_snapshot
  delegate_to: slc9000-write

- name: Assert snapshot retrieved
  ansible.builtin.assert:
    that:
      - dvt3_config_snapshot is not failed
      - dvt3_config_snapshot.commands is defined
    success_msg: "setup_dvt3 | snapshot | write-lane config captured successfully"
    fail_msg: "setup_dvt3 | snapshot | Failed to capture write-lane config"

- name: Save snapshot as CI artifact
  ansible.builtin.copy:
    content: "{{ dvt3_config_snapshot.commands | join('\n') }}"
    dest: "{{ lookup('env', 'GITHUB_WORKSPACE') | default('/tmp', true) }}/write_lane_config_snapshot.txt"
    mode: "0600"
  delegate_to: localhost

- name: Check managed device reachability on write-lane port 1
  ansible.builtin.command:
    cmd: "{{ managed_device_console_command }}"
    stdin: "show version\nexit\n"
  register: device_check
  ignore_errors: true
  delegate_to: localhost

- name: Set managed_device_available fact
  ansible.builtin.set_fact:
    managed_device_available: "{{ device_check.rc == 0 }}"

- name: Warn if managed device unreachable
  ansible.builtin.debug:
    msg: "WARNING: Managed device unreachable on write-lane port 1. Tier 4 tests will be skipped."
  when: not managed_device_available

# UNTESTED STATES:
# - Write-lane device unreachable at suite start: setup_dvt3 will fail if slc_config fails.
#   teardown handles this case via snapshot artifact absence detection.
