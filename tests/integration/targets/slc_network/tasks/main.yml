---
# Read-only test. Do NOT modify IP addresses on a live lab device,
# changing network configuration would break connectivity and fail all
# subsequent tests.

- name: Query eth1 interface configuration
  lantronix.oob.slc_network:
    interface: eth1
  register: result
  check_mode: true
  delegate_to: slc9000

- name: Assert interface field is returned
  ansible.builtin.assert:
    that:
      - result.interface is defined
      - result.interface | length > 0
    success_msg: "Interface returned: {{ result.interface }}"
    fail_msg: "result.interface not returned or empty"

- name: Assert config is a dict
  ansible.builtin.assert:
    that:
      - result.config is defined
      - result.config is mapping
    success_msg: "config dict returned with keys: {{ result.config.keys() | list }}"
    fail_msg: "result.config is not a dict: {{ result.config }}"

- name: Assert interface matches requested interface
  ansible.builtin.assert:
    that:
      - result.interface == 'eth1'
    success_msg: "Interface correctly returned as eth1"
    fail_msg: "Interface mismatch, expected eth1, got {{ result.interface }}"

# UNTESTED STATES:
# - real write (state=present without check_mode): network config write excluded from CI on read lane (connectivity risk).
#   Write lane tested in slc_network_dvt3 with safe changes only (MTU on eth1).
# - eth2 and additional interfaces: only eth1 tested in read lane.
# - DHCP vs static mode transitions: untested.
# - IPv6 configuration: untested; API support for IPv6 not verified.
