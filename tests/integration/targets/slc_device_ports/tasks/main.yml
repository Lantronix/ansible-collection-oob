---
# Read-only tests for device port enumeration.
# NOTE: GET /ports returns HTTP 500 when port counters are unavailable
# (e.g., no serial cables connected). Tests use ignore_errors and assert
# that the result is either a valid list or a specific API error.

- name: Query all device ports
  lantronix.oob.slc_device_ports:
  register: all_ports
  ignore_errors: true
  delegate_to: slc9000

- name: Assert ports call succeeded or failed with known counter error
  ansible.builtin.assert:
    that:
      - >
        (all_ports.failed == false and all_ports.ports is defined and all_ports.ports is iterable)
        or
        ('port counters' in (all_ports.msg | default('')) or 'Error getting port' in (all_ports.msg | default('')))
    success_msg: >
      slc_device_ports: {{ 'ports list with ' + (all_ports.ports | length | string) + ' items'
        if all_ports.failed == false else 'API returned known counter error (no cables connected)' }}
    fail_msg: "Unexpected failure from slc_device_ports: {{ all_ports.msg | default('unknown') }}"

# Query a specific port - also protected since /ports may fail
- name: Query port1 specifically
  lantronix.oob.slc_device_ports:
    port_id: port1
  register: single_port
  ignore_errors: true
  delegate_to: slc9000

- name: Assert port1 query succeeded or returned known error
  ansible.builtin.assert:
    that:
      - >
        (single_port.failed == false and single_port.ports is defined)
        or
        ('port counters' in (single_port.msg | default('')) or 'Error getting port' in (single_port.msg | default('')) or 'not found' in (single_port.msg | default('')))
    fail_msg: "Port1 query failed unexpectedly: {{ single_port.msg | default('unknown error') }}"

- name: Assert port1 result is a list if query succeeded
  ansible.builtin.assert:
    that:
      - single_port.ports is iterable
      - single_port.ports is not string
    success_msg: "port1 ports result: {{ single_port.ports | length }} items"
    fail_msg: "result.ports is not iterable for single port query"
  when: single_port.failed == false and single_port.ports is defined

# gather_connections uses /connections which works independently of /ports
- name: Query connections (gather_connections=true)
  lantronix.oob.slc_device_ports:
    gather_connections: true
  register: ports_with_conns
  ignore_errors: true
  delegate_to: slc9000

- name: Assert connections key is returned when gather_connections succeeds
  ansible.builtin.assert:
    that:
      - ports_with_conns.connections is defined
      - ports_with_conns.connections is iterable
      - ports_with_conns.connections is not string
    success_msg: "Connections returned: {{ ports_with_conns.connections | length }} items"
    fail_msg: "result.connections not returned when gather_connections=true"
  when: ports_with_conns.failed == false

- name: Assert ports also returned alongside connections
  ansible.builtin.assert:
    that:
      - ports_with_conns.ports is defined
      - ports_with_conns.ports is iterable
    success_msg: "Ports returned alongside connections"
    fail_msg: "result.ports missing when gather_connections=true"
  when: ports_with_conns.failed == false and ports_with_conns.ports is defined

- name: Note gather_connections failure if /ports is unavailable
  ansible.builtin.debug:
    msg: "gather_connections skipped assertions: /ports API unavailable ({{ ports_with_conns.msg | default('') }})"
  when: ports_with_conns.failed == true

# UNTESTED STATES:
# - port config write: /ports is GET-only in API v2; writes require CLI (batch) or Tier 4 managed device context.
# - port_id not found: 404 response format assumed but not verified against a genuinely missing port ID.
# - active connection on queried port: behavior when port_id has an active console session is unknown.
