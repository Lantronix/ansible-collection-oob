---
# CRUD cycle for percepxion_config.
# check_mode and read-path (search/absent idempotency) always run.
# Write-path (create/modify/delete) runs only when the account has write access.
# The read-only lane account is read-only for content;
# full CRUD is expected to pass only in the write lane with a write-capable account.

# Pre-clean: remove test config if left from a prior failed run
- name: Pre-clean - ensure test config does not exist
  lantronix.oob.percepxion_config:
    name: "ansible-test-config"
    state: absent
  ignore_errors: true  # noqa: ignore-errors
  delegate_to: percepxion-primary

- name: Percepxion config CRUD test
  block:

    # --- CHECK MODE (always runs - read path only) ---

    - name: percepxion_config | check_mode | create config template
      lantronix.oob.percepxion_config:
        name: "ansible-test-config"
        content_type: "config"
        data: "# Ansible integration test config\nhostname ansible-test\n"
        state: present
      check_mode: true
      register: result_check
      delegate_to: percepxion-primary

    - name: percepxion_config | check_mode | verify
      ansible.builtin.assert:
        that:
          - result_check.changed == true
        success_msg: "percepxion_config | check_mode | correct"
        fail_msg: "percepxion_config | check_mode | FAIL"

    # --- CREATE (may fail in read-only lane environment) ---

    - name: Create test config
      lantronix.oob.percepxion_config:
        name: "ansible-test-config"
        content_type: "config"
        data: "# Ansible integration test config\nhostname ansible-test\n"
        state: present
      register: create_result
      ignore_errors: true  # noqa: ignore-errors
      delegate_to: percepxion-primary

    - name: Note if create was skipped due to read-only environment
      ansible.builtin.debug:
        msg: "percepxion_config write path skipped: account lacks content write access ({{ create_result.msg | default('') }})"
      when: create_result.failed | default(false)

    - name: Verify creation reported changed
      ansible.builtin.assert:
        that:
          - create_result.changed is true
          - create_result.name == 'ansible-test-config'
          - create_result.content_id is defined
          - create_result.content_id | length > 0
        success_msg: "Config created: name={{ create_result.name }}, id={{ create_result.content_id }}"
        fail_msg: "Config creation failed or missing fields: {{ create_result }}"
      when: not (create_result.failed | default(false))

    # --- IDEMPOTENCY ---

    - name: Create same config again to verify idempotency
      lantronix.oob.percepxion_config:
        name: "ansible-test-config"
        content_type: "config"
        data: "# Ansible integration test config\nhostname ansible-test\n"
        state: present
      register: idempotent_create
      delegate_to: percepxion-primary
      when: not (create_result.failed | default(false))

    - name: Verify idempotent create reports no change
      ansible.builtin.assert:
        that:
          - idempotent_create.changed is false
        success_msg: "Idempotent create correctly reported changed=false"
        fail_msg: "Expected changed=false on repeat create, got: {{ idempotent_create.changed }}"
      when: not (create_result.failed | default(false))

    # --- MODIFY (B-1 regression: data change must report changed) ---

    - name: percepxion_config | modify | update config content
      lantronix.oob.percepxion_config:
        name: "ansible-test-config"
        content_type: "config"
        data: "# Ansible integration test config\nhostname ansible-test\ndescription modified-by-ci\n"
        state: present
      register: result_modify
      delegate_to: percepxion-primary
      when: not (create_result.failed | default(false))

    - name: percepxion_config | modify | B-1 regression - data change must report changed
      ansible.builtin.assert:
        that:
          - result_modify.changed is true
        success_msg: "percepxion_config | modify | correct: data change reported changed=true"
        fail_msg: "BUG B-1: percepxion_config uses name-only idempotency - data change silently ignored"
      when: not (create_result.failed | default(false))

    # --- DELETE ---

    - name: Delete test config
      lantronix.oob.percepxion_config:
        name: "ansible-test-config"
        state: absent
      register: delete_result
      delegate_to: percepxion-primary
      when: not (create_result.failed | default(false))

    - name: Verify deletion reported changed
      ansible.builtin.assert:
        that:
          - delete_result.changed is true
        success_msg: "Config deleted, changed=true"
        fail_msg: "Delete did not report changed: {{ delete_result }}"
      when: not (create_result.failed | default(false))

    # --- IDEMPOTENCY (absent again) ---

    - name: Delete same config again to verify absent idempotency
      lantronix.oob.percepxion_config:
        name: "ansible-test-config"
        state: absent
      register: idempotent_delete
      delegate_to: percepxion-primary
      when: not (create_result.failed | default(false))

    - name: Verify idempotent delete reports no change
      ansible.builtin.assert:
        that:
          - idempotent_delete.changed is false
        success_msg: "Idempotent delete correctly reported changed=false"
        fail_msg: "Expected changed=false on repeat delete, got: {{ idempotent_delete.changed }}"
      when: not (create_result.failed | default(false))

  always:
    - name: Cleanup - ensure test config is removed
      lantronix.oob.percepxion_config:
        name: "ansible-test-config"
        state: absent
      ignore_errors: true  # noqa: ignore-errors
      delegate_to: percepxion-primary

# UNTESTED STATES:
# - Full CRUD: write-path tests only run when account has content write access.
#   Read-only lane account is read-only for content; add write-capable
#   credentials to run the full CRUD path.
# - data modify on existing object (B-1 regression): guarded by create success.
# - content_type values beyond "config": "script" and other types assumed to behave identically.
# - large data payload: behavior for configs exceeding API body size limit is untested.
