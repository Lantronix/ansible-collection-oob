---
# The SLC9000 REST API v2 exposes only the sysadmin account (GET /users/sysadmin,
# PATCH /users/sysadmin). Other local users are managed via CLI only.
#
# Tests: read sysadmin attributes, verify fields, and exercise check_mode for
# the password-change path (actual password is NOT changed so the lab stays clean).

- name: Get sysadmin account attributes
  lantronix.oob.slc_users:
  register: result

- name: Assert sysadmin key is returned
  ansible.builtin.assert:
    that:
      - result.sysadmin is defined
      - result.sysadmin is mapping
    success_msg: "sysadmin dict returned"
    fail_msg: "sysadmin key missing from result: {{ result }}"

- name: Assert username is sysadmin
  ansible.builtin.assert:
    that:
      - result.sysadmin.username is defined
      - result.sysadmin.username == "sysadmin"
    success_msg: "username: {{ result.sysadmin.username }}"
    fail_msg: "Unexpected username: {{ result.sysadmin.username }}"

- name: Assert group is defined and non-empty
  ansible.builtin.assert:
    that:
      - result.sysadmin.group is defined
      - result.sysadmin.group | length > 0
    success_msg: "group: {{ result.sysadmin.group }}"
    fail_msg: "group missing or empty"

- name: Assert status is Active
  ansible.builtin.assert:
    that:
      - result.sysadmin.status is defined
      - result.sysadmin.status == "Active"
    success_msg: "status: {{ result.sysadmin.status }}"
    fail_msg: "Expected status Active, got: {{ result.sysadmin.status }}"

- name: Assert read-only query reports no change
  ansible.builtin.assert:
    that:
      - result.changed is false
    success_msg: "Read-only query correctly reported changed=false"
    fail_msg: "Expected changed=false on read-only query, got changed={{ result.changed }}"

- name: Password change in check_mode (does not alter the device)
  lantronix.oob.slc_users:
    new_password: "CheckModeTestPassword123!"
  check_mode: true
  register: check_result

- name: Assert check_mode password change reports changed
  ansible.builtin.assert:
    that:
      - check_result.changed is true
    success_msg: "check_mode password change correctly reported changed=true"
    fail_msg: "Expected changed=true in check_mode, got changed={{ check_result.changed }}"
