---
# Read-only: query all three audit log types and assert required fields.

# Fetch a known device_id to use for the access log test.
- name: Find {{ slc_dvt_hostname }} to get a device_id for access log test
  lantronix.oob.percepxion_devices:
    search_string: "{{ slc_dvt_hostname }}"
    limit: 1
  register: device_lookup
  delegate_to: percepxion-primary

- name: Set device_id fact
  ansible.builtin.set_fact:
    audit_test_device_id: "{{ device_lookup.devices[0].device_id }}"
  when: device_lookup.devices | length > 0

# --- DEVICE AUDIT LOGS ---

- name: Query device audit logs
  lantronix.oob.percepxion_audit_logs:
    log_type: "device"
    tenant_id: "{{ percepxion_tenant_id }}"
  register: device_logs_result
  delegate_to: percepxion-primary

- name: Verify device audit_logs key is a list
  ansible.builtin.assert:
    that:
      - device_logs_result.audit_logs is defined
      - device_logs_result.audit_logs is iterable
    success_msg: "device audit_logs returned {{ device_logs_result.audit_logs | length }} entries"
    fail_msg: "audit_logs key missing or not a list for log_type=device: {{ device_logs_result }}"

# --- USER AUDIT LOGS ---

- name: Query user audit logs
  lantronix.oob.percepxion_audit_logs:
    log_type: "user"
    tenant_id: "{{ percepxion_tenant_id }}"
  register: user_logs_result
  delegate_to: percepxion-primary

- name: Verify user audit_logs key is a list
  ansible.builtin.assert:
    that:
      - user_logs_result.audit_logs is defined
      - user_logs_result.audit_logs is iterable
    success_msg: "user audit_logs returned {{ user_logs_result.audit_logs | length }} entries"
    fail_msg: "audit_logs key missing or not a list for log_type=user: {{ user_logs_result }}"

# --- ACCESS AUDIT LOGS ---

- name: Query access audit logs (returns download URL)
  lantronix.oob.percepxion_audit_logs:
    log_type: "access"
    device_id: "{{ audit_test_device_id }}"
    tenant_id: "{{ percepxion_tenant_id }}"
  register: access_logs_result
  when: audit_test_device_id is defined
  delegate_to: percepxion-primary

- name: Verify access log returns log_content
  ansible.builtin.assert:
    that:
      - access_logs_result.log_content is defined
      - access_logs_result.log_content | length > 0
    success_msg: "access log content returned ({{ access_logs_result.log_content | length }} chars)"
    fail_msg: "log_content missing or empty for log_type=access: {{ access_logs_result }}"
  when: audit_test_device_id is defined

# UNTESTED STATES:
# - access log for device with no access history: empty log_content behavior assumed but not verified.
# - log_type=access without device_id: expected to fail; error response format not verified.
# - pagination for large log sets: limit/offset parameters not tested.
