---
# percepxion_projects smoke test (read-only).
#
# KNOWN LIMITATION: /v3/device/assign requires serial_num + device_name and is
# an org-level import endpoint, not a sub-project reassignment endpoint. No
# sub-project reassignment REST endpoint is available in Percepxion 6.12.
# CRUD coverage lives in unit tests. This test verifies the module runs without
# crashing and correctly reads device state before deciding to act.

- name: Get a device_id for the smoke test
  lantronix.oob.percepxion_devices:
    tenant_id: "{{ percepxion_tenant_id }}"
    limit: 1
  register: devices_result

- name: Fail early if no devices available
  ansible.builtin.assert:
    that:
      - devices_result.devices | length > 0
    fail_msg: "No devices in tenant -- cannot run percepxion_projects smoke test"

- name: Set test device_id fact
  ansible.builtin.set_fact:
    test_device_id: "{{ devices_result.devices[0].device_id }}"

- name: Check device project state with state=absent in check_mode (read-only)
  lantronix.oob.percepxion_projects:
    device_id: "{{ test_device_id }}"
    tenant_id: "{{ percepxion_tenant_id }}"
    state: absent
  check_mode: true
  register: absent_result

- name: Verify module returned device_id
  ansible.builtin.assert:
    that:
      - absent_result is defined
      - absent_result.device_id is defined
    success_msg: "percepxion_projects smoke test passed: device_id={{ absent_result.device_id }}"
    fail_msg: "percepxion_projects module did not return device_id: {{ absent_result }}"
