---
# Tests system identity idempotency and change detection.
#
# Hostname is NOT changed, it would affect DNS, DHCP, and Percepxion enrollment.
# Reboot is NOT tested, it would disrupt the lab.
#
# site_tag (exposed as 'description' in the module) does not persist after a REST
# API write in firmware 9.7.0.0R9. The write triggers a subsystem restart and the
# value reverts. Idempotency for description cannot be validated via API roundtrip
# on this firmware version.
#
# Strategy: use check_mode to validate the module's comparison logic against the
# hostname field (which is readable and stable) without making any actual writes.

- name: Gather current facts to capture original hostname
  lantronix.oob.slc_facts:
  register: initial_facts
  delegate_to: slc9000

# --- Idempotency: hostname already correct, should report no change ---

- name: Set hostname to its current value (no-op check)
  lantronix.oob.slc_system:
    hostname: "{{ initial_facts.slc_facts.hostname }}"
    state: present
  check_mode: true
  register: hostname_noop
  delegate_to: slc9000

- name: Assert same-hostname set reports changed=false
  ansible.builtin.assert:
    that:
      - hostname_noop.changed is false
    success_msg: "Idempotency correct: same hostname reports changed=false"
    fail_msg: "Expected changed=false for same hostname, got changed={{ hostname_noop.changed }}"

- name: Assert returned hostname matches expected
  ansible.builtin.assert:
    that:
      - hostname_noop.hostname == initial_facts.slc_facts.hostname
    success_msg: "Hostname returned correctly: {{ hostname_noop.hostname }}"
    fail_msg: "Hostname mismatch: expected {{ initial_facts.slc_facts.hostname }}, got {{ hostname_noop.hostname }}"

# --- Change detection: different hostname, should report would-change ---

- name: Set hostname to a different value (change detection check)
  lantronix.oob.slc_system:
    hostname: slc9k-integration-test-should-not-apply
    state: present
  check_mode: true
  register: hostname_change
  delegate_to: slc9000

- name: Assert different hostname reports changed=true
  ansible.builtin.assert:
    that:
      - hostname_change.changed is true
    success_msg: "Change detection correct: different hostname reports changed=true"
    fail_msg: "Expected changed=true for different hostname, got changed={{ hostname_change.changed }}"

# --- Description change detection (site_tag, check_mode only) ---

- name: Set description to a value (change detection, no actual write)
  lantronix.oob.slc_system:
    description: ansible-integration-test
    state: present
  check_mode: true
  register: desc_change
  delegate_to: slc9000

- name: Assert description change detected
  ansible.builtin.assert:
    that:
      - desc_change.changed is true
    success_msg: "Description change correctly detected (would-change)"
    fail_msg: "Expected changed=true for description change, got changed={{ desc_change.changed }}"

# UNTESTED STATES:
# - state=reboot: excluded from CI (would terminate the test session and fail all subsequent tests).
# - description (site_tag) persistence: POST /system/identity with site_tag triggers subsystem restart
#   and the value reverts in firmware 9.7.0.0R9. Cannot be validated via API roundtrip on this firmware.
# - hostname change: causes TCP drop and subsystem restart on DVT3; deferred to manual lab test.
# - hostname with special characters: behavior for hostnames with underscores, dots is untested.
