---
# Full CRUD cycle for percepxion_smart_groups.
# Creates a test smart group, verifies idempotency, then deletes it.
# Uses block/always to guarantee cleanup even on failure.
# NOTE: tenant_id must be passed explicitly -- connection.get_tenant_id() returns None.
# NOTE: query_string is an optional filter string; device_ids is the alternative.

# Pre-clean: remove test group if left from a prior failed run
- name: Pre-clean - ensure test smart group does not exist
  lantronix.oob.percepxion_smart_groups:
    name: "ansible-test-sg"
    tenant_id: "{{ percepxion_tenant_id }}"
    state: absent
  ignore_errors: true  # noqa: ignore-errors
  delegate_to: percepxion-primary

- name: Percepxion smart groups CRUD test
  block:

    # --- CHECK MODE ---

    - name: percepxion_smart_groups | check_mode | create smart group
      lantronix.oob.percepxion_smart_groups:
        name: "ansible-test-sg"
        query_string: "firmware_version=9.7.0.0R8"
        tenant_id: "{{ percepxion_tenant_id }}"
        state: present
      check_mode: true
      register: result_check
      delegate_to: percepxion-write
      when: percepxion_host is defined and percepxion_host | length > 0

    - name: percepxion_smart_groups | check_mode | verify
      ansible.builtin.assert:
        that:
          - result_check.changed == true
        success_msg: "percepxion_smart_groups | check_mode | correct"
        fail_msg: "percepxion_smart_groups | check_mode | FAIL"
      when: percepxion_host is defined and percepxion_host | length > 0

    # --- CREATE ---

    - name: Create test smart group
      lantronix.oob.percepxion_smart_groups:
        name: "ansible-test-sg"
        query_string: "firmware_version=9.7.0.0R8"
        tenant_id: "{{ percepxion_tenant_id }}"
        state: present
      register: create_result
      delegate_to: percepxion-primary

    - name: Verify creation reported changed
      ansible.builtin.assert:
        that:
          - create_result.changed is true
          - create_result.name == 'ansible-test-sg'
          - create_result.group_id is defined
          - create_result.group_id | length > 0
        success_msg: "Smart group created: name={{ create_result.name }}, id={{ create_result.group_id }}"
        fail_msg: "Smart group creation failed or missing fields: {{ create_result }}"

    - name: Store group_id for later use
      ansible.builtin.set_fact:
        test_group_id: "{{ create_result.group_id }}"

    # --- IDEMPOTENCY ---

    - name: Create same smart group again to verify idempotency
      lantronix.oob.percepxion_smart_groups:
        name: "ansible-test-sg"
        query_string: "firmware_version=9.7.0.0R8"
        tenant_id: "{{ percepxion_tenant_id }}"
        state: present
      register: idempotent_create
      delegate_to: percepxion-primary

    - name: Verify idempotent create reports no change
      ansible.builtin.assert:
        that:
          - idempotent_create.changed is false
        success_msg: "Idempotent create correctly reported changed=false"
        fail_msg: "Expected changed=false on repeat create, got: {{ idempotent_create.changed }}"

    # --- MODIFY (Tier 2 / write lane only) ---

    - name: percepxion_smart_groups | modify | change query_string
      lantronix.oob.percepxion_smart_groups:
        name: "ansible-test-sg"
        query_string: "firmware_version=9.7.0.0R9"
        tenant_id: "{{ percepxion_tenant_id }}"
        state: present
      register: result_modify
      delegate_to: percepxion-write
      when: percepxion_host is defined and percepxion_host | length > 0

    - name: percepxion_smart_groups | modify | B-2 regression - query_string change must report changed
      ansible.builtin.assert:
        that:
          - result_modify.changed is true
        success_msg: "percepxion_smart_groups | modify | correct: query_string change reported changed=true"
        fail_msg: "BUG B-2: percepxion_smart_groups uses name-only idempotency - query_string change silently ignored"
      when: percepxion_host is defined and percepxion_host | length > 0

    # --- DELETE ---

    - name: Delete test smart group
      lantronix.oob.percepxion_smart_groups:
        name: "ansible-test-sg"
        tenant_id: "{{ percepxion_tenant_id }}"
        state: absent
      register: delete_result
      delegate_to: percepxion-primary

    - name: Verify deletion reported changed
      ansible.builtin.assert:
        that:
          - delete_result.changed is true
        success_msg: "Smart group deleted, changed=true"
        fail_msg: "Delete did not report changed: {{ delete_result }}"

    # --- IDEMPOTENCY (absent again) ---

    - name: Delete same group again to verify absent idempotency
      lantronix.oob.percepxion_smart_groups:
        name: "ansible-test-sg"
        tenant_id: "{{ percepxion_tenant_id }}"
        state: absent
      register: idempotent_delete
      delegate_to: percepxion-primary

    - name: Verify idempotent delete reports no change
      ansible.builtin.assert:
        that:
          - idempotent_delete.changed is false
        success_msg: "Idempotent delete correctly reported changed=false"
        fail_msg: "Expected changed=false on repeat delete, got: {{ idempotent_delete.changed }}"

  always:
    - name: Cleanup - ensure test smart group is removed
      lantronix.oob.percepxion_smart_groups:
        name: "ansible-test-sg"
        tenant_id: "{{ percepxion_tenant_id }}"
        state: absent
      ignore_errors: true  # noqa: ignore-errors
      delegate_to: percepxion-primary

# UNTESTED STATES:
# - query_string modify on existing group: BUG B-2, module uses name-only idempotency; query_string changes
#   are silently ignored. Regression test added in percepxion_smart_groups Tier 2 modify step to catch this bug.
# - device_ids parameter: static membership (device_ids list) not tested; only query_string tested.
# - smart group used by firmware job: behavior when deleting a group with active jobs is undocumented.
