---
- name: Check for config snapshot artifact
  ansible.builtin.stat:
    path: "{{ lookup('env', 'GITHUB_WORKSPACE') | default('/tmp', true) }}/write_lane_config_snapshot.txt"
  register: snapshot_stat
  delegate_to: localhost

- name: Skip teardown if no snapshot exists
  ansible.builtin.debug:
    msg: "teardown_write_lane | No snapshot artifact found. Skipping restore."
  when: not snapshot_stat.stat.exists

- name: Read config snapshot
  ansible.builtin.slurp:
    src: "{{ lookup('env', 'GITHUB_WORKSPACE') | default('/tmp', true) }}/write_lane_config_snapshot.txt"
  register: snapshot_content
  when: snapshot_stat.stat.exists
  delegate_to: localhost

- name: Restore write-lane config from snapshot
  lantronix.oob.slc_config:
    action: batch
    commands: "{{ (snapshot_content.content | b64decode).split('\n') | select | list }}"
  register: restore_result
  when: snapshot_stat.stat.exists
  delegate_to: slc9000-write

- name: Assert restore completed without error
  ansible.builtin.assert:
    that:
      - restore_result is not failed
    success_msg: "teardown_write_lane | restore | write-lane config restored successfully"
    fail_msg: "teardown_write_lane | restore | Config restore failed, write-lane device may need manual reset"
  when: snapshot_stat.stat.exists

- name: Verify write-lane hostname matches expected value
  lantronix.oob.slc_facts:
  register: write_lane_facts
  delegate_to: slc9000-write
  when: snapshot_stat.stat.exists

- name: Assert hostname matches baseline
  ansible.builtin.assert:
    that:
      - write_lane_facts.slc_facts.hostname == slc_write_hostname
    success_msg: "teardown_write_lane | verify | Hostname confirmed: {{ write_lane_facts.slc_facts.hostname }}"
    fail_msg: "teardown_write_lane | verify | Hostname mismatch: got {{ write_lane_facts.slc_facts.hostname }}, expected {{ slc_write_hostname }}"
  when: snapshot_stat.stat.exists

# UNTESTED STATES:
# - Partial restore failure: batch command fails mid-apply. Manual intervention required.
#   No automated recovery; teardown marks the job failed so the runner investigates
#   before the next run.
