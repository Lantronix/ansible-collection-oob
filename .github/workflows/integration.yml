---
name: Integration Tests

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      lane:
        description: 'Test lane to run'
        required: false
        default: 'all'
        type: choice
        options: [all, read, write]

jobs:
  sanity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: ansible_collections/lantronix/oob
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install ansible-core
        run: pip install ansible-core
      - name: Run sanity tests
        working-directory: ansible_collections/lantronix/oob
        run: ansible-test sanity --python 3.11

  unit:
    runs-on: ubuntu-latest
    needs: sanity
    steps:
      - uses: actions/checkout@v4
        with:
          path: ansible_collections/lantronix/oob
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install ansible-core requests
      - name: Run unit tests
        working-directory: ansible_collections/lantronix/oob
        run: ansible-test units --python 3.11

  setup_write_lane:
    runs-on: self-hosted
    needs: unit
    if: ${{ github.event.inputs.lane != 'read' }}
    steps:
      - uses: actions/checkout@v4
        with:
          path: ansible_collections/lantronix/oob
      - name: Write integration_config.yml from secrets
        working-directory: ansible_collections/lantronix/oob
        env:
          SLC_READ_HOST: ${{ secrets.SLC9_IP }}
          SLC_READ_USER: ${{ secrets.SLC9_USER }}
          SLC_READ_PASS: ${{ secrets.SLC9_PASSWORD }}
          SLC_READ_HOSTNAME: ${{ secrets.SLC9_HOSTNAME }}
          SLC_WRITE_HOST: ${{ secrets.SLC9K_DVT3_IP }}
          SLC_WRITE_USER: ${{ secrets.SLC9K_DVT3_USER }}
          SLC_WRITE_PASS: ${{ secrets.SLC9K_DVT3_PASSWORD }}
          SLC_WRITE_HOSTNAME: ${{ secrets.SLC9K_DVT3_HOSTNAME }}
          PX_READ_HOST: ${{ secrets.PX_API_BASE }}
          PX_READ_USER: ${{ secrets.PX_PROJECT_USER }}
          PX_READ_PASS: ${{ secrets.PX_PROJECT_PASSWORD }}
          PX_HOST: ${{ secrets.PX_API_BASE_DVT3 }}
          PX_URL: ${{ secrets.PX_URL_DVT3 }}
          PX_USER: ${{ secrets.PX_PROJECT_USER_DVT3 }}
          PX_PASS: ${{ secrets.PX_PROJECT_PASSWORD_DVT3 }}
          PX_PORTAL: ${{ secrets.PX_PORTAL_NAME_DVT3 }}
          PX_ORG: ${{ secrets.PX_ORG_NAME_DVT3 }}
          MANAGED_DEVICE_HOST: ${{ secrets.MANAGED_DEVICE_IP }}
          MANAGED_DEVICE_USER: ${{ secrets.MANAGED_DEVICE_USERNAME }}
          MANAGED_DEVICE_PASS: ${{ secrets.MANAGED_DEVICE_PASSWORD }}
          MANAGED_DEVICE_CMD: ${{ secrets.MANAGED_DEVICE_CONSOLE_COMMAND }}
        run: |
          cat > tests/integration/integration_config.yml << 'ENDOFCONFIG'
          slc_read_host: "${SLC_READ_HOST}"
          slc_read_username: "${SLC_READ_USER}"
          slc_read_password: "${SLC_READ_PASS}"
          slc_read_hostname: "${SLC_READ_HOSTNAME}"
          slc_write_host: "${SLC_WRITE_HOST}"
          slc_write_username: "${SLC_WRITE_USER}"
          slc_write_password: "${SLC_WRITE_PASS}"
          slc_write_hostname: "${SLC_WRITE_HOSTNAME}"
          percepxion_read_host: "${PX_READ_HOST}"
          percepxion_read_username: "${PX_READ_USER}"
          percepxion_read_password: "${PX_READ_PASS}"
          percepxion_host: "${PX_HOST}"
          percepxion_url: "${PX_URL}"
          percepxion_username: "${PX_USER}"
          percepxion_password: "${PX_PASS}"
          percepxion_portal: "${PX_PORTAL}"
          percepxion_org: "${PX_ORG}"
          managed_device_host: "${MANAGED_DEVICE_HOST}"
          managed_device_username: "${MANAGED_DEVICE_USER}"
          managed_device_password: "${MANAGED_DEVICE_PASS}"
          managed_device_console_command: "${MANAGED_DEVICE_CMD}"
          managed_device_port: 1
          ENDOFCONFIG
          envsubst < tests/integration/integration_config.yml > /tmp/ic.yml && mv /tmp/ic.yml tests/integration/integration_config.yml
      - name: Run write-lane setup
        working-directory: ansible_collections/lantronix/oob
        run: ansible-test integration setup_dvt3 --python 3.11
      - name: Upload config snapshot
        uses: actions/upload-artifact@v4
        with:
          name: write-lane-config-snapshot
          path: /tmp/write_lane_config_snapshot.txt
          if-no-files-found: warn

  integration_read:
    runs-on: self-hosted
    needs: unit
    if: ${{ github.event.inputs.lane != 'write' }}
    steps:
      - uses: actions/checkout@v4
        with:
          path: ansible_collections/lantronix/oob
      - name: Write integration_config.yml from secrets
        working-directory: ansible_collections/lantronix/oob
        env:
          SLC_READ_HOST: ${{ secrets.SLC9_IP }}
          SLC_READ_USER: ${{ secrets.SLC9_USER }}
          SLC_READ_PASS: ${{ secrets.SLC9_PASSWORD }}
          SLC_READ_HOSTNAME: ${{ secrets.SLC9_HOSTNAME }}
          PX_READ_HOST: ${{ secrets.PX_API_BASE }}
          PX_READ_USER: ${{ secrets.PX_PROJECT_USER }}
          PX_READ_PASS: ${{ secrets.PX_PROJECT_PASSWORD }}
        run: |
          cat > tests/integration/integration_config.yml << 'ENDOFCONFIG'
          slc_read_host: "${SLC_READ_HOST}"
          slc_read_username: "${SLC_READ_USER}"
          slc_read_password: "${SLC_READ_PASS}"
          slc_read_hostname: "${SLC_READ_HOSTNAME}"
          percepxion_read_host: "${PX_READ_HOST}"
          percepxion_read_username: "${PX_READ_USER}"
          percepxion_read_password: "${PX_READ_PASS}"
          ENDOFCONFIG
          envsubst < tests/integration/integration_config.yml > /tmp/ic.yml && mv /tmp/ic.yml tests/integration/integration_config.yml
      - name: Log firmware version (read lane)
        working-directory: ansible_collections/lantronix/oob
        run: ansible-test integration slc_facts --python 3.11
        continue-on-error: true
      - name: Run read-only integration tests
        working-directory: ansible_collections/lantronix/oob
        run: |
          ansible-test integration \
            slc_config slc_device_ports slc_facts slc_firmware \
            slc_managed_devices slc_network slc_system slc_users \
            percepxion_aoob_session percepxion_audit_logs percepxion_config \
            percepxion_devices percepxion_facts percepxion_firmware \
            percepxion_import_devices percepxion_jobs percepxion_projects \
            percepxion_smart_groups percepxion_telemetry percepxion_users \
            --python 3.11
      - name: Extract UNTESTED STATES to job summary
        if: always()
        working-directory: ansible_collections/lantronix/oob
        run: |
          echo "## Known Test Gaps" >> $GITHUB_STEP_SUMMARY
          grep -r "# UNTESTED STATES:" tests/integration/targets/ -A 3 \
            --include="main.yml" >> $GITHUB_STEP_SUMMARY || true

  integration_write:
    runs-on: self-hosted
    needs: setup_write_lane
    if: ${{ github.event.inputs.lane != 'read' }}
    steps:
      - uses: actions/checkout@v4
        with:
          path: ansible_collections/lantronix/oob
      - name: Download config snapshot
        uses: actions/download-artifact@v4
        with:
          name: write-lane-config-snapshot
          path: /tmp
      - name: Write integration_config.yml from secrets
        working-directory: ansible_collections/lantronix/oob
        env:
          SLC_READ_HOST: ${{ secrets.SLC9_IP }}
          SLC_READ_USER: ${{ secrets.SLC9_USER }}
          SLC_READ_PASS: ${{ secrets.SLC9_PASSWORD }}
          SLC_READ_HOSTNAME: ${{ secrets.SLC9_HOSTNAME }}
          SLC_WRITE_HOST: ${{ secrets.SLC9K_DVT3_IP }}
          SLC_WRITE_USER: ${{ secrets.SLC9K_DVT3_USER }}
          SLC_WRITE_PASS: ${{ secrets.SLC9K_DVT3_PASSWORD }}
          SLC_WRITE_HOSTNAME: ${{ secrets.SLC9K_DVT3_HOSTNAME }}
          PX_HOST: ${{ secrets.PX_API_BASE_DVT3 }}
          PX_URL: ${{ secrets.PX_URL_DVT3 }}
          PX_USER: ${{ secrets.PX_PROJECT_USER_DVT3 }}
          PX_PASS: ${{ secrets.PX_PROJECT_PASSWORD_DVT3 }}
          PX_PORTAL: ${{ secrets.PX_PORTAL_NAME_DVT3 }}
          PX_ORG: ${{ secrets.PX_ORG_NAME_DVT3 }}
          MANAGED_DEVICE_HOST: ${{ secrets.MANAGED_DEVICE_IP }}
          MANAGED_DEVICE_USER: ${{ secrets.MANAGED_DEVICE_USERNAME }}
          MANAGED_DEVICE_PASS: ${{ secrets.MANAGED_DEVICE_PASSWORD }}
          MANAGED_DEVICE_CMD: ${{ secrets.MANAGED_DEVICE_CONSOLE_COMMAND }}
        run: |
          cat > tests/integration/integration_config.yml << 'ENDOFCONFIG'
          slc_read_host: "${SLC_READ_HOST}"
          slc_read_username: "${SLC_READ_USER}"
          slc_read_password: "${SLC_READ_PASS}"
          slc_read_hostname: "${SLC_READ_HOSTNAME}"
          slc_write_host: "${SLC_WRITE_HOST}"
          slc_write_username: "${SLC_WRITE_USER}"
          slc_write_password: "${SLC_WRITE_PASS}"
          slc_write_hostname: "${SLC_WRITE_HOSTNAME}"
          percepxion_host: "${PX_HOST}"
          percepxion_url: "${PX_URL}"
          percepxion_username: "${PX_USER}"
          percepxion_password: "${PX_PASS}"
          percepxion_portal: "${PX_PORTAL}"
          percepxion_org: "${PX_ORG}"
          managed_device_host: "${MANAGED_DEVICE_HOST}"
          managed_device_username: "${MANAGED_DEVICE_USER}"
          managed_device_password: "${MANAGED_DEVICE_PASS}"
          managed_device_console_command: "${MANAGED_DEVICE_CMD}"
          managed_device_port: 1
          ENDOFCONFIG
          envsubst < tests/integration/integration_config.yml > /tmp/ic.yml && mv /tmp/ic.yml tests/integration/integration_config.yml
      - name: Run write-lane integration tests
        working-directory: ansible_collections/lantronix/oob
        run: |
          ansible-test integration \
            slc_system_dvt3 slc_users_dvt3 slc_config_dvt3 slc_network_dvt3 \
            slc_device_ports_dvt3 slc_managed_devices_dvt3 \
            percepxion_config percepxion_smart_groups \
            percepxion_users_dvt3 percepxion_projects_dvt3 \
            percepxion_import_devices_dvt3 percepxion_jobs_dvt3 \
            percepxion_firmware_dvt3 percepxion_aoob_session_dvt3 \
            --python 3.11

  teardown_write_lane:
    runs-on: self-hosted
    needs: [integration_write]
    if: always()
    steps:
      - uses: actions/checkout@v4
        with:
          path: ansible_collections/lantronix/oob
      - name: Download config snapshot
        uses: actions/download-artifact@v4
        with:
          name: write-lane-config-snapshot
          path: /tmp
        continue-on-error: true
      - name: Write integration_config.yml from secrets
        working-directory: ansible_collections/lantronix/oob
        env:
          SLC_WRITE_HOST: ${{ secrets.SLC9K_DVT3_IP }}
          SLC_WRITE_USER: ${{ secrets.SLC9K_DVT3_USER }}
          SLC_WRITE_PASS: ${{ secrets.SLC9K_DVT3_PASSWORD }}
          SLC_WRITE_HOSTNAME: ${{ secrets.SLC9K_DVT3_HOSTNAME }}
        run: |
          cat > tests/integration/integration_config.yml << 'ENDOFCONFIG'
          slc_write_host: "${SLC_WRITE_HOST}"
          slc_write_username: "${SLC_WRITE_USER}"
          slc_write_password: "${SLC_WRITE_PASS}"
          slc_write_hostname: "${SLC_WRITE_HOSTNAME}"
          ENDOFCONFIG
          envsubst < tests/integration/integration_config.yml > /tmp/ic.yml && mv /tmp/ic.yml tests/integration/integration_config.yml
      - name: Run write-lane teardown
        working-directory: ansible_collections/lantronix/oob
        run: ansible-test integration teardown_dvt3 --python 3.11
