---
- name: Check firmware compliance across fleet
  lantronix.oob.percepxion_firmware:
    smart_group_id: "{{ oob_firmware_audit_smart_group_id }}"
    firmware_version: "{{ oob_firmware_audit_target_version }}"
    state: check
  register: oob_firmware_audit_result

- name: Report non-compliant devices
  ansible.builtin.debug:
    msg: "Non-compliant: {{ oob_firmware_audit_result.non_compliant_devices | map(attribute='device_name') | list }}"
  when: oob_firmware_audit_result.non_compliant_devices | length > 0

- name: Trigger firmware update (when remediate=true)
  lantronix.oob.percepxion_firmware:
    smart_group_id: "{{ oob_firmware_audit_smart_group_id }}"
    firmware_version: "{{ oob_firmware_audit_target_version }}"
    state: update
  when:
    - oob_firmware_audit_remediate | bool
    - oob_firmware_audit_result.non_compliant_devices | length > 0
