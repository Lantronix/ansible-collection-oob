---
# Master validation playbook, runs all 20 lantronix.oob module integration tests.
# Run from the collection root:
#   ansible-playbook validate/validate_all.yml -i validate/inventory.yml
#
# Each module section prints a banner so failures are easy to locate.

# ---------------------------------------------------------------------------
# SLC 9000 modules (8)
# ---------------------------------------------------------------------------
- name: SLC 9000 module validation
  hosts: slc9k
  gather_facts: false

  tasks:

    - name: "=== slc_facts ==="
      ansible.builtin.debug:
        msg: "Running slc_facts integration tests"

    - name: Include slc_facts integration tasks
      ansible.builtin.include_tasks:
        file: ../tests/integration/targets/slc_facts/tasks/main.yml

    - name: "=== slc_users ==="
      ansible.builtin.debug:
        msg: "Running slc_users integration tests"

    - name: Include slc_users integration tasks
      ansible.builtin.include_tasks:
        file: ../tests/integration/targets/slc_users/tasks/main.yml

    - name: "=== slc_config ==="
      ansible.builtin.debug:
        msg: "Running slc_config integration tests"

    - name: Include slc_config integration tasks
      ansible.builtin.include_tasks:
        file: ../tests/integration/targets/slc_config/tasks/main.yml

    - name: "=== slc_device_ports ==="
      ansible.builtin.debug:
        msg: "Running slc_device_ports integration tests"

    - name: Include slc_device_ports integration tasks
      ansible.builtin.include_tasks:
        file: ../tests/integration/targets/slc_device_ports/tasks/main.yml

    - name: "=== slc_firmware ==="
      ansible.builtin.debug:
        msg: "Running slc_firmware integration tests (read-only)"

    - name: Include slc_firmware integration tasks
      ansible.builtin.include_tasks:
        file: ../tests/integration/targets/slc_firmware/tasks/main.yml

    - name: "=== slc_managed_devices ==="
      ansible.builtin.debug:
        msg: "Running slc_managed_devices integration tests"

    - name: Include slc_managed_devices integration tasks
      ansible.builtin.include_tasks:
        file: ../tests/integration/targets/slc_managed_devices/tasks/main.yml

    - name: "=== slc_network ==="
      ansible.builtin.debug:
        msg: "Running slc_network integration tests (read-only)"

    - name: Include slc_network integration tasks
      ansible.builtin.include_tasks:
        file: ../tests/integration/targets/slc_network/tasks/main.yml

    - name: "=== slc_system ==="
      ansible.builtin.debug:
        msg: "Running slc_system integration tests"

    - name: Include slc_system integration tasks
      ansible.builtin.include_tasks:
        file: ../tests/integration/targets/slc_system/tasks/main.yml


