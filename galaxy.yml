namespace: lantronix
name: oob
version: 1.0.19
readme: README.md
description: Ansible collection for Lantronix Out-of-Band infrastructure (SLC9000 + Percepxion)
license:
  - Apache-2.0
authors:
  - Lantronix Product Team <ansible@lantronix.com>
repository: https://github.com/Lantronix/ansible-collection-oob
documentation: https://github.com/Lantronix/ansible-collection-oob/tree/main/docs
homepage: https://www.lantronix.com
issues: https://github.com/Lantronix/ansible-collection-oob/issues
tags:
  - networking
  - oob
  - lantronix
  - percepxion
  - console_server
  - slc9000
  - serial_console
build_ignore:
